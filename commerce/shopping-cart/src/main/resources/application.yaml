spring:
  application:
    name: shopping-cart
  config:
    import: "configserver:"
  cloud:
    config:
      fail-fast: true
      discovery:
        enabled: true
        serviceId: config-server
      retry:
        useRandomPolicy: true
        max-interval: 6000

logging:
  level:
    ru.yandex.practicum: DEBUG
    org.springframework.cloud: info
    org.springframework.web: info